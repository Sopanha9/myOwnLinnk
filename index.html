<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soo Panha · Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --glass-bg: rgba(255, 255, 255, 0.06);
        --glass-border: rgba(255, 255, 255, 0.14);
        --glass-hover: rgba(255, 255, 255, 0.12);
        --blur: blur(18px);
        --accent1: #a78bfa;
        --accent2: #38bdf8;
        --accent3: #f472b6;
      }

      html,
      body {
        min-height: 100%;
        font-family: "Space Grotesk", sans-serif;
        background: #050510;
        color: #e2e8f0;
        overflow-x: hidden;
      }

      /* ── Particle canvas ── */
      #particles {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      /* ── Page wrapper ── */
      .page {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 60px 20px 80px;
      }

      /* ── Main glass card ── */
      .card {
        width: 100%;
        max-width: 480px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        backdrop-filter: var(--blur);
        -webkit-backdrop-filter: var(--blur);
        border-radius: 28px;
        padding: 48px 36px 40px;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.04) inset,
          0 30px 80px rgba(0, 0, 0, 0.5);
        animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── Profile section ── */
      .profile {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 36px;
      }

      .avatar-wrap {
        position: relative;
        width: 96px;
        height: 96px;
        margin-bottom: 18px;
        border-radius: 50%;
        padding: 3px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.25),
          0 8px 32px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
      }
      .avatar {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        overflow: hidden;
      }
      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
        display: block;
      }

      .name {
        font-family:
          "Inter",
          "SF Pro Display",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.8px;
        color: #ffffff;
        margin-bottom: 6px;
        line-height: 1.1;
      }
      .tagline {
        font-size: 0.85rem;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      /* ── Divider ── */
      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--glass-border),
          transparent
        );
        margin-bottom: 28px;
      }

      /* ── Link buttons ── */
      .links {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .link-btn {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 15px 20px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        text-decoration: none;
        color: #e2e8f0;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transition:
          background 0.25s,
          border-color 0.25s,
          transform 0.2s,
          box-shadow 0.25s;
        animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        position: relative;
        overflow: hidden;
      }
      .link-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          transparent 0%,
          rgba(255, 255, 255, 0.04) 50%,
          transparent 100%
        );
        transform: translateX(-100%);
        transition: transform 0.5s ease;
      }
      .link-btn:hover::before {
        transform: translateX(100%);
      }
      .link-btn:hover {
        background: var(--glass-hover);
        border-color: rgba(255, 255, 255, 0.28);
        transform: translateY(-2px) scale(1.01);
        box-shadow:
          0 8px 30px rgba(0, 0, 0, 0.35),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      }
      .link-btn:active {
        transform: translateY(0) scale(0.99);
      }

      /* staggered animation delays */
      .link-btn:nth-child(1) {
        animation-delay: 0.15s;
      }
      .link-btn:nth-child(2) {
        animation-delay: 0.22s;
      }
      .link-btn:nth-child(3) {
        animation-delay: 0.29s;
      }
      .link-btn:nth-child(4) {
        animation-delay: 0.36s;
      }
      .link-btn:nth-child(5) {
        animation-delay: 0.43s;
      }

      .link-icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 1.2rem;
      }

      .link-label {
        flex: 1;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      .link-arrow {
        opacity: 0.35;
        font-size: 0.9rem;
        transition:
          opacity 0.2s,
          transform 0.2s;
      }
      .link-btn:hover .link-arrow {
        opacity: 0.8;
        transform: translateX(3px);
      }

      /* Per-platform icon colours */
      .icon-telegram {
        background: rgba(41, 182, 246, 0.18);
        color: #29b6f6;
        box-shadow: 0 0 14px rgba(41, 182, 246, 0.2);
      }
      .icon-facebook {
        background: rgba(66, 103, 178, 0.18);
        color: #6b98f0;
        box-shadow: 0 0 14px rgba(66, 103, 178, 0.2);
      }
      .icon-youtube {
        background: rgba(255, 70, 70, 0.18);
        color: #ff6b6b;
        box-shadow: 0 0 14px rgba(255, 70, 70, 0.2);
      }
      .icon-tiktok {
        background: rgba(105, 240, 174, 0.15);
        color: #69f0ae;
        box-shadow: 0 0 14px rgba(105, 240, 174, 0.2);
      }
      .icon-website {
        background: rgba(167, 139, 250, 0.18);
        color: #a78bfa;
        box-shadow: 0 0 14px rgba(167, 139, 250, 0.2);
      }

      /* ── Footer ── */
      .footer {
        margin-top: 28px;
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.2);
        letter-spacing: 0.5px;
        text-align: center;
      }

      /* ── Responsive ── */
      @media (max-width: 520px) {
        .card {
          padding: 36px 22px 32px;
          border-radius: 22px;
        }
        .name {
          font-size: 1.35rem;
        }
      }
    </style>

    <script>
      (function () {
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");

        // Accent palette matching CSS variables
        const COLORS = ["#a78bfa", "#38bdf8", "#f472b6", "#818cf8", "#67e8f9"];
        const COUNT = 90;
        const MAX_DIST = 130; // line-drawing threshold (px)
        const SPEED = 0.4;

        let W,
          H,
          mouse = { x: -9999, y: -9999 };

        function resize() {
          W = canvas.width = window.innerWidth;
          H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        window.addEventListener("mousemove", (e) => {
          mouse.x = e.clientX;
          mouse.y = e.clientY;
        });
        window.addEventListener("mouseleave", () => {
          mouse.x = -9999;
          mouse.y = -9999;
        });

        // Build particles
        const particles = Array.from({ length: COUNT }, () => ({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          vx: (Math.random() - 0.5) * SPEED,
          vy: (Math.random() - 0.5) * SPEED,
          r: Math.random() * 1.8 + 0.8,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          alpha: Math.random() * 0.5 + 0.3,
        }));

        function draw() {
          ctx.clearRect(0, 0, W, H);

          // Update positions
          for (const p of particles) {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0 || p.x > W) p.vx *= -1;
            if (p.y < 0 || p.y > H) p.vy *= -1;

            // Gentle attraction toward mouse
            const dx = mouse.x - p.x;
            const dy = mouse.y - p.y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 180 && d > 0) {
              p.x += (dx / d) * 0.35;
              p.y += (dy / d) * 0.35;
            }
          }

          // Draw connection lines
          for (let i = 0; i < particles.length; i++) {
            const a = particles[i];
            for (let j = i + 1; j < particles.length; j++) {
              const b = particles[j];
              const dx = a.x - b.x;
              const dy = a.y - b.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < MAX_DIST) {
                const opacity = (1 - dist / MAX_DIST) * 0.25;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.strokeStyle = a.color;
                ctx.globalAlpha = opacity;
                ctx.lineWidth = 0.8;
                ctx.stroke();
              }
            }
          }

          // Draw dots
          for (const p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.alpha;
            ctx.fill();
          }

          ctx.globalAlpha = 1;
          requestAnimationFrame(draw);
        }

        draw();
      })();
    </script>
